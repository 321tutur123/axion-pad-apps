name: Java CI

on:
  push:
    paths:
      - "application/**"
      - ".github/workflows/java-ci.yml"
  pull_request:
    paths:
      - "application/**"
      - ".github/workflows/java-ci.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build, test and analyse
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: application

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run tests
        run: mvn -B -q test

      - name: SpotBugs static analysis
        run: mvn -B spotbugs:check

      - name: Upload SpotBugs report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: application/target/spotbugsXml.xml
